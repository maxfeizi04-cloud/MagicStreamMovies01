name: CI/CD

on:
  pull_request:
  push:
  workflow_dispatch:

env:
  GO_VERSION: "1.24.2"
  NODE_VERSION: "22"
  DEFAULT_VITE_API_BASE_URL: "http://localhost:8080"
  BACKEND_IMAGE: "ghcr.io/${{ github.repository_owner }}/magicstream-backend"
  FRONTEND_IMAGE: "ghcr.io/${{ github.repository_owner }}/magicstream-frontend"

jobs:
  ci:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: Server/MagicStreamServer/go.sum

      - name: Run Go tests
        working-directory: Server/MagicStreamServer
        run: go test ./...

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Client/magic-stream-client/package-lock.json

      - name: Install frontend dependencies
        working-directory: Client/magic-stream-client
        run: npm ci

      - name: Lint frontend
        working-directory: Client/magic-stream-client
        run: npm run lint

      - name: Build frontend
        working-directory: Client/magic-stream-client
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || env.DEFAULT_VITE_API_BASE_URL }}
        run: npm run build

      - name: Validate Docker Compose
        run: docker compose --env-file .env.example config > /dev/null

  publish-backend:
    name: Publish backend image
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./Server/MagicStreamServer
          file: ./Server/MagicStreamServer/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-frontend:
    name: Publish frontend image
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./Client/magic-stream-client
          file: ./Client/magic-stream-client/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || env.DEFAULT_VITE_API_BASE_URL }}

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs:
      - publish-backend
      - publish-frontend
    if: (github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main') && vars.ENABLE_DEPLOY == 'true'
    env:
      BACKEND_IMAGE_TAG: ${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}
      FRONTEND_IMAGE_TAG: ${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
          envs: BACKEND_IMAGE_TAG,FRONTEND_IMAGE_TAG
          script: |
            set -eu
            cd "${{ secrets.DEPLOY_PATH }}"
            echo "${{ secrets.GHCR_PULL_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_PULL_USERNAME }}" --password-stdin
            export BACKEND_IMAGE="${BACKEND_IMAGE_TAG}"
            export FRONTEND_IMAGE="${FRONTEND_IMAGE_TAG}"
            docker compose pull api frontend
            docker compose up -d --remove-orphans
